<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compare Constraint</title>
    <script src="../js/util.js"></script>
    <script src="../js/websocket.js"></script>
    <script src="../js/checkAction.js" defer></script>
    <style>
     .row {
    	display: flex;
    	align-items: center;
    	gap: 10px;
    	margin-bottom: 8px;
    }
    .row label {
    	font-weight: bold;
    	white-space: nowrap;
     }
     .row pre {
    	margin: 0;
    	background: #f5f5f5;
    	padding: 4px 8px;
    	border: 1px solid #ddd;
        flex: 1;            /
        white-space: pre-wrap;
     }
     .container {
        display: flex;
        gap: 10px;
        height: 500px;
     }
    .editor {
    	flex: 1;
    	border: 1px solid #ccc;
    	padding: 10px;
    	overflow: auto;
    	font-family: monospace;
    	white-space: pre-wrap;
    }
    #checkTableContainer {
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid #ccc;
    }

    #checkTable {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
    }

    #checkTable th, #resultTable td {
        border: 1px solid #ccc;
        padding: 5px;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }

    #checkTable th {
        background-color: #f2f2f2;
        text-align: left;
    }

    #checkTable td {
        vertical-align: top;
    }

    .sigma,
    .forti {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: monospace;
      vertical-align: top;
    }

    .rule-file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .rule-file-input {
      flex: 1;
      padding: 4px 6px;
    }
   </style>
</head>
<body>
   <div class="row" id="newRuleFileRow">
     <label>Rule File Name:</label>

     <input list="ruleFileList" id="RuleFile" name="RuleFile" class="rule-file-input" style="width: 500px;" placeholder="Input rule file name or select from list">
     <datalist id="ruleFileList"></datalist>
     <button type="button" onclick="openFileChooser()">Select File</button>
     <button type="button" onclick="clearSelectedFile()">Clear</button>
     <input type="file" id="selectedRuleXml" accept=".xml" style="display:none" onchange="onRuleXmlChange()">
   </div>
    <div class="row">
    <label >Commit ID of Sigma Repo:</label>
    <input type="text" id="commitId" placeholder="Default: the latest commit id" value="" class="rule-file-input">
    </div>
   <div class="row" id="newRuleFileRow">
     <label>Rule File Type:</label>
     <select id="RuleFileType">
       <option value="rule">Rule</option>
       <option value="error">Error</option>
     </select>
   </div>

    <div class="row">
      <button id="clearBtn" onclick="clearTable()">Clear Table</button>
      <button id="refreshBtn" onclick="refresh()">Refresh Table</button>
      <button id="downloadBtn" onclick="downloadRule()">Download Rule File</button>
    </div>

    <pre id="log"></pre>

    <label style="font-weight: bold;">Sigma Rule VS FortiSIEM Rule</label>
    <table border="1" width="100%" id=checkTable>
       <thead>
         <tr>
           <th>Sigma Rule</th>
           <th>FortiSIEM Rule (Editable)</th>
         </tr>
       </thead>
      <tbody id="checkTableBody">
      </tbody>
    </table>


    <div>
    <button id="closeBtn" onclick="quit()">Close</button>
    </div>
</body>

</html>
